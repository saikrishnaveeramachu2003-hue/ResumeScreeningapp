spring.application.name=uploadservice
server.port=6002

# ================= OLLAMA =================
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
spring.ai.ollama.chat.options.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0
llm.timeout-ms=60000

# ================= KAFKA =================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

spring.kafka.consumer.group-id=resume-group
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ================= MYSQL =================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/atsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:atsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ats123}

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

